<!-- IFS Copperleaf — Cooper FAB. Self-contained reference implementation.
     Inline SVG — no external assets required.

     Contexts:
       default (48px "with stroke") — screens WITHOUT a black surface
     States: default · hover (aurora glow + scale) · pressed · disabled · focus.
     Tooltip: "Ask Cooper /" — Label M medium, black fill, blur strong,
     radius 2, floating shadow, arrow pointing down. -->
<style>
.cooper-fab {
  position: relative; width: 48px; height: 48px;
  padding: 0; border: none; background: none; cursor: pointer;
  overflow: visible; flex-shrink: 0;
}
.cooper-fab:disabled { cursor: not-allowed; }
.cooper-fab:focus-visible { outline: none; }
.cooper-fab svg {
  display: block;
  filter: drop-shadow(0 0 8px rgba(155,93,229,0.30)) drop-shadow(0 0 20px rgba(200,121,65,0.15));
  transition: filter 400ms, transform 300ms;
}
.cooper-fab:hover:not(:disabled) svg {
  transform: scale(1.04);
  animation: cooper-fab-aurora 3.6s ease-in-out infinite;
}
.cooper-fab:active:not(:disabled) svg {
  transform: scale(0.97);
  animation: none;
  filter: drop-shadow(0 0 6px rgba(155,93,229,0.20));
}
.cooper-fab:disabled svg { filter: none; opacity: 0.4; }
.cooper-fab:focus-visible svg {
  filter: drop-shadow(0 0 0 3px rgba(115,104,255,0.60)) drop-shadow(0 0 8px rgba(155,93,229,0.30));
}
@keyframes cooper-fab-aurora {
  0%   { filter: drop-shadow(0 0 10px rgba(155,93,229,0.55)) drop-shadow(0 0 28px rgba(155,93,229,0.25)) drop-shadow(0 0 52px rgba(90,18,191,0.18)); }
  22%  { filter: drop-shadow(0 0 14px rgba(251,196,230,0.65)) drop-shadow(0 0 34px rgba(200,121,65,0.35)) drop-shadow(0 0 60px rgba(155,93,229,0.22)); }
  50%  { filter: drop-shadow(0 0 18px rgba(237,140,83,0.60)) drop-shadow(0 0 40px rgba(251,196,230,0.30)) drop-shadow(0 0 68px rgba(200,121,65,0.20)); }
  78%  { filter: drop-shadow(0 0 14px rgba(90,18,191,0.60)) drop-shadow(0 0 34px rgba(155,93,229,0.32)) drop-shadow(0 0 58px rgba(251,196,230,0.18)); }
  100% { filter: drop-shadow(0 0 10px rgba(155,93,229,0.55)) drop-shadow(0 0 28px rgba(155,93,229,0.25)) drop-shadow(0 0 52px rgba(90,18,191,0.18)); }
}
@media (prefers-reduced-motion: reduce) {
  .cooper-fab svg { animation: none; transition: none; transform: none; }
}
.cooper-fab .fab-tip {
  position: absolute; bottom: calc(100% + 4px); left: 50%;
  display: flex; flex-direction: column; align-items: flex-end;
  filter: drop-shadow(0 4px 4px rgba(0,0,0,0.25));
  opacity: 0; visibility: hidden; transform: translateX(-50%) translateY(2px);
  transition: opacity var(--motion-duration-fast, 120ms) var(--motion-ease-decelerate, ease-out),
              transform var(--motion-duration-fast, 120ms) var(--motion-ease-decelerate, ease-out),
              visibility 0s linear var(--motion-duration-fast, 120ms);
}
.cooper-fab:hover:not(:disabled) .fab-tip {
  opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); transition-delay: 0s;
}
.cooper-fab .fab-tip .tip-body {
  display: flex; gap: var(--gap-100, 4px);
  background: var(--surface-primary, #fff);
  backdrop-filter: blur(var(--blur-strong, 20px));
  padding: var(--padding-100, 4px) var(--padding-200, 8px);
  border-radius: var(--radius-50, 2px);
  font-family: var(--font-sans, Inter, sans-serif);
  font-size: var(--label-m-size, 12px); line-height: var(--label-m-line, 1.5);
  font-weight: var(--label-m-weight, 500); letter-spacing: -0.15px;
  color: var(--text-primary, #000); white-space: nowrap;
}
.cooper-fab .fab-tip .hotkey { color: var(--text-disabled, rgba(0,0,0,0.35)); }
.cooper-fab .fab-tip .tip-arrow {
  width: 0; height: 0; margin-right: 14px;
  border-left: 4.3px solid transparent; border-right: 4.3px solid transparent;
  border-top: 5px solid var(--surface-primary, #fff);
}
</style>
