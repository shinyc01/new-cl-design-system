<!-- UI-kit view code is inlined (NOT separate .jsx files) so the design-system
     compiler does not bundle it into _ds_bundle.js / auto-run its render. -->
<script type="text/babel" data-presets="react">
/* === charts === */
(function(){
/* IFS Copperleaf — UI-kit chart presentationals (pure SVG/CSS, dataviz tokens). */

const DV = ['var(--dataviz-1)','var(--dataviz-2)','var(--dataviz-3)','var(--dataviz-4)','var(--dataviz-5)','var(--dataviz-6)','var(--dataviz-7)','var(--dataviz-8)'];

/* Stacked horizontal allocation bar — the portfolio-split motif. */
function AllocationBar({ segments, height = 34, money = false }) {
  const total = segments.reduce((s, x) => s + x.value, 0);
  return (
    <div style={{ display:'flex', gap:3, width:'100%' }}>
      {segments.map((s, i) => {
        const pct = (s.value / total) * 100;
        return (
          <div key={i} title={`${s.label} · ${money ? '$'+s.value+'M' : Math.round(pct)+'%'}`}
            style={{ flex:`${pct} 0 0`, height, borderRadius:6, background: s.color || DV[i % DV.length],
              display:'flex', alignItems:'center', justifyContent:'center', minWidth:0, overflow:'hidden',
              color:'#fff', fontSize:12, fontWeight:600, letterSpacing:'-.2px',
              boxShadow:'inset 0 1px 0 rgba(255,255,255,.12)' }}>
            {pct > 6 ? (money ? '$'+s.value+'M' : Math.round(pct)+'%') : ''}
          </div>
        );
      })}
    </div>
  );
}

/* Legend row for a series. */
function Legend({ items }) {
  return (
    <div style={{ display:'flex', flexWrap:'wrap', gap:'8px 16px', marginTop:14 }}>
      {items.map((it, i) => (
        <div key={i} style={{ display:'flex', alignItems:'center', gap:7, fontSize:11.5, color:'var(--text-secondary)' }}>
          <span style={{ width:9, height:9, borderRadius:3, background: it.color || DV[i % DV.length] }} />
          {it.label}
        </div>
      ))}
    </div>
  );
}

/* Treemap — strategic objectives by value. Simple slice-and-dice. */
function Treemap({ data, height = 220 }) {
  const total = data.reduce((s, d) => s + d.value, 0);
  return (
    <div style={{ display:'flex', gap:4, height, width:'100%' }}>
      {data.map((d, i) => {
        const w = (d.value / total) * 100;
        const kids = d.children || [];
        const ktot = kids.reduce((s, k) => s + k.value, 0) || 1;
        const base = d.color || DV[i % DV.length];
        return (
          <div key={i} style={{ flex:`${w} 0 0`, minWidth:0, display:'flex', flexDirection:'column', gap:4 }}>
            <div style={{ background:base, borderRadius:7, padding:'10px 12px', color:'#fff',
              boxShadow:'inset 0 1px 0 rgba(255,255,255,.14)', minHeight:54 }}>
              <div style={{ fontSize:11, opacity:.85, letterSpacing:'.2px' }}>{d.label}</div>
              <div style={{ fontSize:18, fontWeight:600, letterSpacing:'-.4px' }}>${d.value}M</div>
            </div>
            {kids.length ? (
              <div style={{ display:'flex', gap:4, flex:1 }}>
                {kids.map((k, j) => (
                  <div key={j} title={`${k.label} · $${k.value}M`}
                    style={{ flex:`${(k.value/ktot)*100} 0 0`, minWidth:0, background:base, opacity:.5,
                      borderRadius:6, padding:'7px 9px', color:'#fff', fontSize:10.5, fontWeight:500,
                      display:'flex', alignItems:'flex-end' }}>
                    <span style={{ whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{k.label}</span>
                  </div>
                ))}
              </div>
            ) : null}
          </div>
        );
      })}
    </div>
  );
}

/* Capex burn — grouped columns (plan vs actual) by quarter. */
function BurnChart({ data, height = 180 }) {
  const max = Math.max(...data.flatMap(d => [d.plan, d.actual])) * 1.1;
  return (
    <div>
      <div style={{ display:'flex', alignItems:'flex-end', gap:18, height, padding:'0 4px' }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:8, height:'100%' }}>
            <div style={{ flex:1, display:'flex', alignItems:'flex-end', gap:6, width:'100%', justifyContent:'center' }}>
              <div title={`Plan $${d.plan}M`} style={{ width:'34%', height:`${(d.plan/max)*100}%`,
                background:'var(--white-150)', borderRadius:'4px 4px 0 0' }} />
              <div title={`Actual $${d.actual}M`} style={{ width:'34%', height:`${(d.actual/max)*100}%`,
                background:'var(--accent-brand)', borderRadius:'4px 4px 0 0',
                boxShadow:'inset 0 1px 0 rgba(255,255,255,.2)' }} />
            </div>
            <div style={{ fontSize:11, color:'var(--text-tertiary)' }}>{d.label}</div>
          </div>
        ))}
      </div>
      <Legend items={[{label:'Plan',color:'var(--white-150)'},{label:'Actual',color:'var(--accent-brand)'}]} />
    </div>
  );
}

/* Donut gauge for a single coverage/score metric. */
function Donut({ value, label, sub, color = 'var(--accent-brand)', size = 116 }) {
  const r = size/2 - 9, c = 2*Math.PI*r, off = c*(1 - value/100);
  return (
    <div style={{ display:'flex', alignItems:'center', gap:16 }}>
      <svg width={size} height={size} style={{ flex:'none' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--white-100)" strokeWidth="9" />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="9" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={off} transform={`rotate(-90 ${size/2} ${size/2})`} />
        <text x="50%" y="49%" textAnchor="middle" fontSize="24" fontWeight="600" fill="var(--text-primary)"
          fontFamily="var(--font-sans)" letterSpacing="-.6">{value}%</text>
        <text x="50%" y="64%" textAnchor="middle" fontSize="10" fill="var(--text-tertiary)" fontFamily="var(--font-sans)">{sub}</text>
      </svg>
      <div>
        <div style={{ fontSize:14, fontWeight:600 }}>{label}</div>
        <div style={{ fontSize:12, color:'var(--text-tertiary)', maxWidth:150, lineHeight:1.4 }}>{sub}</div>
      </div>
    </div>
  );
}

Object.assign(window, { AllocationBar, Legend, Treemap, BurnChart, Donut, DV });

})();
</script>
<script type="text/babel" data-presets="react">

          <Checkbox label="Apply to the Optimized scenario only" defaultChecked />
        </div>
        <div style={{ marginTop:'auto', padding:18, borderTop:'1px solid var(--border-subtle)', display:'flex', gap:10 }}>
          <Button variant="ghost" block onClick={onClose}>Dismiss</Button>
          <Button variant="accent" block leadingIcon={<Icon name="check" size={15}/>} onClick={onClose}>Accept</Button>
        </div>
      </div>
    </>
  );
}

function App() {
  const [nav, setNav] = React.useState('overview');
  const [tab, setTab] = React.useState('overview');
  const [dim, setDim] = React.useState('3d');
  const [drawer, setDrawer] = React.useState(false);
  const view = tab === 'map' ? <MapView/> : tab === 'capital' ? <CapitalFlowView dim={dim}/> : <OverviewView dim={dim}/>;
  return (
    <div style={{ position:'absolute', inset:0, display:'flex', background:'var(--surface-1)', color:'var(--text-primary)', fontFamily:'var(--font-sans)', overflow:'auto' }}>
      <window.Rail active={nav} onNav={(id)=>{ setNav(id); if(id==='overview'||id==='map') setTab(id); }} />
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:1180 }}>
        <window.Header tab={tab} onTab={setTab} dim={dim} onDim={setDim}
          onReview={()=>setDrawer(true)} onRec={()=>setDrawer(true)} />
        <div style={{ flex:1, overflow:'auto', padding:18 }}>{view}</div>
      </div>
      <Drawer open={drawer} onClose={()=>setDrawer(false)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

})();
</script>
</body>
</html>
